# ===================================================================
# CẤU HÌNH ỨNG DỤNG THƯ VIỆN PTIT
# ===================================================================

# --- Tên ứng dụng ---
spring.application.name=thuvien-ptit

# --- Cổng chạy ---
server.port=8080

# ===================================================================
# CẤU HÌNH JSP VIEW RESOLVER
# ===================================================================
spring.mvc.view.prefix=/WEB-INF/views/
spring.mvc.view.suffix=.jsp

# ===================================================================
# CẤU HÌNH MYSQL DATABASE
# ===================================================================
spring.datasource.url=jdbc:mysql://localhost:3306/thuvienptit
spring.datasource.username=root
spring.datasource.password=Daotunglam28
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===================================================================
# CẤU HÌNH JPA / HIBERNATE
# ===================================================================
# Tự động tạo/cập nhật bảng từ Entity (dùng khi dev, production nên dùng "validate" hoặc "none")
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===================================================================
# CẤU HÌNH STATIC RESOURCES
# ===================================================================
spring.web.resources.static-locations=classpath:/static/,classpath:/public/

# ===================================================================
# CẤU HÌNH LOGGING
# ===================================================================
logging.level.root=INFO
logging.level.com.ptit.thuvien=DEBUG
logging.level.org.springframework.security=DEBUG

# ===================================================================
# CẤU HÌNH UPLOAD FILE
# ===================================================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
