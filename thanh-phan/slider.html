<section class="slider">
<div class="slides">
    <div class="slide active" style="background-image: url('../tai-nguyen/slide1.jpg')"></div>
<div class="slide" style="background-image: url('../tai-nguyen/slide2.jpg')"></div>
<div class="slide" style="background-image: url('../tai-nguyen/slide3.jpg')"></div>
<div class="slide" style="background-image: url('../tai-nguyen/slide4.jpg')"></div>
    <button class="prev" onclick="prevSlide()">❮</button>
    <button class="next" onclick="nextSlide()">❯</button>

    <div class="dots">
        <span onclick="goToSlide(0)"></span>
        <span onclick="goToSlide(1)"></span>
        <span onclick="goToSlide(2)"></span>
        <span onclick="goToSlide(3)"></span>
    </div>

</section>
